<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <link rel="icon" type="image/x-icon" href="index.ico">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: #000; /* hoặc đổi màu tùy bạn */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Loading screen nếu muốn thêm */
    .loading {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      font-size: 18px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">Loading app...</div>
  <iframe src="https://bossgaming404-server-admin.hf.space" 
          onload="document.getElementById('loading').style.display='none'"></iframe>
</body>
</html>
